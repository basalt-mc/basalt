name: Feature
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Current state, related issues/decisions, and why this matters now.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing, broken, or suboptimal? Number the problems if there are several.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: How should this be solved? Include code snippets, API sketches, or architectural notes if relevant.
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which crates, files, or areas are affected?
    validations:
      required: true
  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: What does this unlock or improve?
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: What is explicitly out of scope for this issue?
    validations:
      required: true
