name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build debug deps first, cache for all downstream jobs ─────────
  build:
    name: Build (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-debug
      - run: cargo build --lib --bins --tests --examples --all-features

  # ── Format (no deps needed) ─────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Debug-profile jobs (depend on build dev) ─────────────────────
  clippy:
    name: Clippy
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-debug
          save-if: false
      - run: cargo clippy --lib --bins --tests --examples --all-features -- -D warnings

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-debug
          save-if: false
      - run: cargo test --all-features

  coverage:
    name: Coverage
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-debug
          save-if: false
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --all-features --fail-under-lines 90 --ignore-filename-regex "(examples|packets/|xtask/src/recipes\.rs|basalt-recipes/src/generated\.rs|basalt-api/src/testing/)"

  codegen:
    name: Codegen Drift Check
    if: github.event_name == 'pull_request'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-debug
          save-if: false
      - run: cargo run --package xtask -- codegen
      - run: cargo fmt --all
      - name: Check generated code is up to date
        run: |
          if ! git diff --exit-code crates/basalt-mc-protocol/src/packets/; then
            echo "::error::Generated packets are out of date. Run 'cargo xt codegen && cargo fmt --all' and commit the result."
            exit 1
          fi

  proptest:
    name: Extended Proptests
    if: github.event_name == 'pull_request'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-debug
          save-if: false
      - name: Run proptests with extended case count
        env:
          PROPTEST_CASES: 1000
        run: cargo test --all-features -- proptest

  # ── Benchmark jobs (nightly toolchain, independent) ───────────────
  benchmark:
    name: Bench ${{ matrix.bench }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bench: varint
            crate: basalt-types
          - bench: nbt
            crate: basalt-types
          - bench: chunk
            crate: basalt-world
          - bench: ecs
            crate: basalt-ecs
          - bench: write_packet
            crate: basalt-net
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: bench-nightly

      # Restore previous benchmark data from cache
      - uses: actions/cache@v4
        with:
          path: ./benchmark-data.json
          key: bench-${{ matrix.bench }}-${{ github.sha }}
          restore-keys: |
            bench-${{ matrix.bench }}-

      - name: Run benchmark
        env:
          CRATE: ${{ matrix.crate }}
          BENCH: ${{ matrix.bench }}
        run: |
          set -o pipefail
          cargo +nightly bench -p "$CRATE" --bench "$BENCH" | tee output.txt

      - name: Compare and store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: ${{ matrix.bench }}
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          external-data-json-path: ./benchmark-data.json
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: ${{ github.event_name == 'pull_request' }}

  # ── Independent jobs (no build dep) ──────────────────────────────
  fuzz:
    name: Fuzz ${{ matrix.target }}
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_varint
          - fuzz_string
          - fuzz_nbt
          - fuzz_slot
          - fuzz_opaque
          - fuzz_packet_play
          - fuzz_text_component
          - fuzz_position
          - fuzz_decompress
          - fuzz_chunk_deserialize
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
          shared-key: fuzz-${{ matrix.target }}
      - run: cargo install cargo-fuzz
      - name: Run fuzzer (30s)
        working-directory: fuzz
        env:
          TARGET: ${{ matrix.target }}
        run: cargo +nightly fuzz run "$TARGET" -- -max_total_time=30

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
